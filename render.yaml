services:
  # Backend: Django API (Python Web Service)
  - type: web
    name: emitra-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emitra-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "emitra-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://emitra-frontend.onrender.com"

  # Frontend: Vite React (Static Site)
  - type: web
    name: emitra-frontend
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    plan: free
    routes:
      - type: rewrite
        source: /api/*
        destination: https://emitra-backend.onrender.com/api/*
      - type: rewrite
        source: /media/*
        destination: https://emitra-backend.onrender.com/media/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: emitra-db
    plan: free
